{% extends "base.html" %}
{% load i18n %}
{% load django_bootstrap5 %}

{% block title %}{{ object.get_short_name }}{% endblock %}

{% block content %}
  <div class="w-50">
    <h1>{% trans "Profile" %}</h1>

    {% include 'partials/profile_navigation.html' %}

    <div class="mt-3">
      <form action="." method="post">
        {% csrf_token %}

        {% bootstrap_form form %}

        <button type="submit" class="btn btn-primary">{% translate 'Save changes' %}</button>
      </form>
    </div>
  </div>
{% endblock %}
