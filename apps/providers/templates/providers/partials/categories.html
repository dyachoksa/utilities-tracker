{% load i18n %}
<ul class="mt-3 list-group list-group-flush">
  {% for category in categories %}
    <li class="list-group-item d-flex gap-2 justify-content-between align-items-center">
      <span style="color: {{ category.color }}">
        <i class="{{ category.icon }}"></i>
      </span>

      <span class="flex-grow-1" style="color: {{ category.color }}; font-weight: 500">{{ category.name }} ({{ category.providers_count }})</span>

      <button
        class="px-1 py-0 btn btn-link"
        title="{% trans 'Edit category' %}"
        hx-get="{{ category.get_edit_url }}"
        hx-target="#dialog"
      >
        <i class="fa-regular fa-pen-to-square"></i>
      </button>

      <button
        class="px-1 py-0 btn btn-link"
        title="{% trans 'Delete category' %}"
        hx-get="{{ category.get_delete_url }}"
        hx-target="#dialog"
      >
        <i class="fa-regular fa-trash-can"></i>
      </button>
    </li>
  {% endfor %}
</ul>
