{% load i18n %}
<ul class="mt-3 list-group list-group-flush">
  {% for plan in payment_plans %}
    <li class="list-group-item d-flex gap-2 justify-content-between align-items-center">
      <span>
        {% if plan.is_upcoming %}<i class="text-info fa-regular fa-clock"></i>{% endif %}
        {% if plan.is_active %}<i class="text-success fa-regular fa-circle-check"></i>{% endif %}
        {% if plan.is_archived %}
          <i class="text-body-secondary fa-solid fa-box-archive"></i>
        {% endif %}
      </span>

      <span class="flex-grow-1 text-black fw-medium">{{ plan.amount }}</span>

      <span class="text-body-secondary">{{ plan.start_date }}</span>

      <button
        class="px-1 py-0 btn btn-link"
        title="{% trans 'Edit payment plan' %}"
        hx-get="{{ plan.get_edit_url }}"
        hx-target="#dialog"
      >
        <i class="fa-regular fa-pen-to-square"></i>
      </button>

      <button
        class="px-1 py-0 btn btn-link"
        title="{% trans 'Delete payment plan' %}"
        hx-get="{{ plan.get_delete_url }}"
        hx-target="#dialog"
      >
        <i class="fa-regular fa-trash-can"></i>
      </button>

    </li>
  {% endfor %}
</ul>
