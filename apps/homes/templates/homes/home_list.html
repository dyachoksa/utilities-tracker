{% extends "base.html" %}
{% load i18n static %}

{% block title %}{% trans 'Homes & Apartments' %}{% endblock %}

{% block content %}
  <div class="d-flex flex-row g-2 justify-content-between align-items-center">
    <h1>{% trans 'Homes & Apartments' %}</h1>

    <div>
      <button
        class="btn btn-light"
        title="{% trans 'Add a new home or apartment' %}"
        hx-get="{% url 'homes:create' %}"
        hx-target="#dialog"
      >
        {% trans 'Add home' %}
      </button>
    </div>
  </div>

  <div class="mt-4 row" hx-trigger="home-list-changed from:body" hx-get="{% url 'homes:index' %}" hx-target="this">
    {% include 'homes/partials/homes.html' %}
  </div>
{% endblock %}
